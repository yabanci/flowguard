version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [errcheck, gosec, staticcheck]
      - path: "benchmarks/"
        linters: [errcheck]
      - path: "examples/"
        linters: [gosec, errcheck]
